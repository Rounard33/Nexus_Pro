<div class="modal-overlay" *ngIf="(prestation && activeVariant) as v" (click)="onOverlayClick($event)">
  <div class="modal-content" (click)="$event.stopPropagation()">
    <div class="modal-header">
    <button class="modal-close" (click)="closeModal()" aria-label="Fermer">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M18 6L6 18M6 6l12 12"/>
      </svg>
    </button>
      <h2 class="modal-title">{{ modalHeadline }}</h2>
      <div class="reiki-tabs" *ngIf="isGroup" role="tablist" aria-label="Formats Reiki">
        <button
          type="button"
          class="reiki-tab"
          *ngFor="let tab of groupVariants; let i = index"
          [class.reiki-tab--active]="i === activeReikiTab"
          (click)="setReikiTab(i)"
          role="tab"
          [attr.aria-selected]="i === activeReikiTab"
        >
          {{ reikiTabLabel(tab) }}
        </button>
      </div>
    </div>
    <div class="modal-body">
      <h3 class="modal-variant-title" *ngIf="isGroup">{{ v.name }}</h3>
      <div class="modal-description">
        <p class="description-text">{{ v.description }}</p>
      </div>
      
      <!-- Contre-indications -->
      <div class="contraindications-section" *ngIf="v.hasContraindications && v.contraindications">
        <div class="contraindications-box">
          <pre class="contraindications-text">{{ v.contraindications }}</pre>
        </div>
      </div>
      
      <div class="modal-details">
        <div class="modal-price">{{ v.price }}</div>
        <div class="modal-price" *ngIf="v.priceOption">
          {{ v.priceOption }}
        </div>
        <div class="modal-price" *ngIf="v.atHome">
          {{ v.atHome }}
        </div>
        <div class="modal-duration" *ngIf="v.duration">
          Durée : {{ v.duration }}
        </div>
      </div>
      <!-- Suggestion forfait -->
      <div
        class="forfait-suggestion"
        *ngIf="forfaitSuggestionText"
        (click)="scrollToForfaits()"
      >
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 2L2 7l10 5 10-5-10-5z"/>
          <path d="M2 17l10 5 10-5"/>
          <path d="M2 12l10 5 10-5"/>
        </svg>
        <span>{{ forfaitSuggestionText }}</span>
      </div>

      <div class="booking-notice">
        <span class="booking-notice-icon">⏳</span>
        <span class="booking-notice-text">Réservation bientôt disponible en ligne</span>
      </div>
      <div class="modal-actions">
        <button 
          class="btn btn-primary btn-lg" 
          (click)="onBook()" 
          [disabled]="true"
        >
          {{ v.requiresContact ? 'Contacter' : 'Réserver' }}
        </button>
      </div>
    </div>
  </div>
</div>
