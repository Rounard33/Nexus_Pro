<!-- Section Forfaits -->
<section class="forfaits" id="forfaits">
  <div class="container">
    <app-section-header 
      badge="Forfaits" 
      title="Mes forfaits bien-être"
      description="Des formules avantageuses pour un accompagnement sur-mesure">
    </app-section-header>

    <div class="forfaits-grid">
      <div class="forfait-card" *ngFor="let forfait of forfaits" [class.forfait-featured]="forfait.id === 'accompagnement-global'">
        
        <div class="forfait-icon">
          <svg *ngIf="forfait.id === 'accompagnement-global'"  width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M12 2l2.4 7.2L22 12l-7.6 2.8L12 22l-2.4-7.2L2 12l7.6-2.8L12 2z" stroke-linejoin="round"/>
          </svg>
          <svg *ngIf="forfait.id === 'cure-energetique'" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 2a7 7 0 0 1 0 14 7 7 0 0 1 0-14"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg *ngIf="forfait.id === 'reconnexion-a-soi'" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/>
          </svg>
        </div>

        <h3 class="forfait-name">{{ forfait.name }}</h3>
        <p class="forfait-description">{{ forfait.description }}</p>

        <ul class="forfait-details">
          <li *ngFor="let detail of forfait.details">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <polyline points="20 6 9 17 4 12"/>
            </svg>
            <span>{{ detail }}</span>
          </li>
        </ul>

        <div class="forfait-pricing">
          <span class="forfait-price-old">{{ forfait.originalPrice }}</span>
          <span class="forfait-price">{{ forfait.price }}</span>
        </div>
        <p class="forfait-savings">soit une économie de {{ forfait.savings }}</p>
      </div>
    </div>

    <!-- FAQ liens vers prestations -->
    <div class="forfaits-faq">
      <h3 class="forfaits-faq-title">En savoir plus sur les soins</h3>
      <div class="forfaits-faq-links">
        <button *ngFor="let faq of faqItems" class="forfait-faq-link" (click)="onFaqClick(faq.prestationKeyword)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/>
            <line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
          <span>{{ faq.question }}</span>
          <svg class="arrow-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</section>
